<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Admin Login</title>
    <link rel="icon" type="image/png" href="/adminLogin/photos/neulogo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="left-content">
                <img src="/adminLogin/photos/neulogo.png" alt="NEU Logo" class="big-logo">
                <h1>NEW ERA UNIVERSITY</h1>
                <h2>LIBRARY SYSTEM</h2>
                <p>Admin Portal</p>
                <div class="divider"></div>
                <p class="quote">"Knowledge is the foundation of progress"</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-card">
                <div class="card-header">
                    <span class="admin-badge">🔐 ADMIN ACCESS</span>
                    <h2>Welcome Back</h2>
                    <p>Sign in to your admin account</p>
                </div>

                <form>
                    <div class="field">
                        <label>Institutional Email</label>
                        <input type="email" id="email" placeholder="admin@neu.edu.ph">
                        <p id="emailError" class="error-message"></p>
                    </div>

                    <div class="field">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter your password">
                            <button type="button" id="togglePassword" class="toggle-btn">👁</button>
                        </div>
                        <p id="passwordError" class="error-message"></p>
                    </div>

                    <p id="loginError" class="error-message"></p>

                    <button type="submit" id="loginBtn" class="login-btn">
                        LOG IN AS ADMIN
                    </button>
                </form>

                <div class="card-footer">
                    <a href="/Login/login.html">← Back to User Login</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/supabase.js"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
