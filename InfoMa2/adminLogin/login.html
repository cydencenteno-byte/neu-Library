<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Era University Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <img src="/InfoMa2/adminLogin/photos/neulogo.png" alt="New Era University Logo" class="logotop">
        <h3>NEU LIBRARY ADMIN</h3>
    </nav>
    <div class="maincontent">
    <div class="left-side">
        <div class="building"></div>
        <div class="texts">
            <h1>Welcome to NEU Library
                Your gateway to knowledge.</h1>
                <p>Knowledge is Power.
                NEU Library Open to all.</p>
        </div>
    </div>
    <div class="right-side">
    <div class="bgimg"></div>
    <div class="bglogo"></div>
    <div class="header-container">
    <div class="logo"> <img src="/InfoMa2/adminLogin/photos/neulogo.png" alt="New Era University Logo"></div>
    <header>
        <h2>NEW ERA UNIVERSITY</h2>
        <h1>LIBRARY ADMIN LOG IN</h1>
    </header>
    </div>
    <main>
        <form>
        <div class="Login">
            <h3>Name:</h3>
            <input type="text" id="name" placeholder="Enter your name">
            <h3>Password:</h3>
            <input type="password" id="password" placeholder="Enter your password">   
            <button type="submit" id="loginBtn">LOG IN</button>
        </div>
        </form>
    </main>
    </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
