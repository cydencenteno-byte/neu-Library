<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/Login/photos/neulogo.png">
    <title>New Era University|Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <img src="/Login/photos/neulogo.png" alt="New Era University Logo" class="logotop">
        <h3>NEU LIBRARY</h3>
        <a href="/adminLogin/login.html" class="admin-btn">Admin</a>
    </nav>
    <div class="maincontent">
    <div class="left-side">
        <div class="building"></div>
        <div class="texts">
            <h1>Welcome to NEU Library
                Your gateway to knowledge.</h1>
                <p>Knowledge is Power.
                NEU Library Open to all.</p>
        </div>
    </div>
    <div class="right-side">
    <div class="bgimg"></div>
    <div class="bglogo"></div>
    <div class="header-container">
    <div class="logo"> <img src="/Login/photos/neulogo.png" alt="New Era University Logo"></div>
    <header>
        <h2>NEW ERA UNIVERSITY</h2>
        <h1>LIBRARY</h1>
    </header>
    </div>
    <main>
        <form>
        <div class="Login">
            <h3>Email:</h3>
            <input type="email" id="email" placeholder="@neu.edu.ph">
            <p id="emailError" class="error-message"></p>
            <h3>Password:</h3>
            <input type="password" id="password" placeholder="Enter your password">   
            <p id="passwordError" class="error-message"></p>
            <p id="loginError" class="error-message"></p>
            <button type="submit" id="loginBtn">LOG IN</button>
        </div>
        <div class="signup">
            <p>Don't have an account? <a href="/Registration/register.html">Register here</a></p>
        </div>
        </form>
    </main>
    </div>
    </div>
    <script type="module" src="/supabase.js"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
