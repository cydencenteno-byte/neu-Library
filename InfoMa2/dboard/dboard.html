<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEU Library</title>
    <link rel="stylesheet" href="dboard.css">
</head>
<body>
    <nav>
        <img src="/WelcomPage/photos/neulogo.png" class="logotop">
        <h3>NEU LIBRARY</h3>
        <button id="logoutBtn" class="logoutbtn">Logout</button>
    </nav>

    <div class="inside-container">
        <div class="inside-card">
            <h2 id="userName">Loading...</h2>
            <p id="roleInfo"></p>
            <p id="timeIn"></p>
            <button id="exitBtn" class="exitBtn">Exit Library</button>
            <hr>
            <h3>Your Visit History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Reason</th>
                        <th>Time In</th>
                        <th>Time Out</th>
                    </tr>
                </thead>
                <tbody id="visitHistory"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="/supabase.js"></script>
    <script type="module" src="dboard.js"></script>
</body>
</html>
